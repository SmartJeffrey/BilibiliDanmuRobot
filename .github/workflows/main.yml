name: Build & Release Multi Platform Binary

on:
  push:
    branches: [ master, main ]
    tags: ['v*']
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          # Linux / MacOS 常规编译
          - { GOOS: linux, GOARCH: amd64, suffix: "", ldflags: "" }
          - { GOOS: linux, GOARCH: arm64, suffix: "", ldflags: "" }
          - { GOOS: darwin, GOARCH: amd64, suffix: "", ldflags: "" }
          - { GOOS: darwin, GOARCH: arm64, suffix: "", ldflags: "" }
          # Linux amd64 musl 全静态编译
          - { GOOS: linux, GOARCH: amd64, suffix: "-musl", ldflags: "", musl: true }
          # Windows 控制台版（带黑窗口，调试用）
          - { GOOS: windows, GOARCH: amd64, suffix: "-console", ldflags: "" }
          # Windows GUI 无控制台版
          - { GOOS: windows, GOARCH: amd64, suffix: "-gui", ldflags: "-H windowsgui" }

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      # 仅musl构建才安装工具链
      - name: Install musl toolchain
        if: matrix.target.musl == true
        run: |
          sudo apt update && sudo apt install -y musl-tools

      - name: Download go mod dependencies
        run: go mod download

      - name: Compile & Package
        run: |
          mkdir -p output tmp_pack
          BIN_NAME="output/bilidanmaku${{ matrix.target.suffix }}"
          if [[ "${{ matrix.target.GOOS }}" == "windows" ]]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi

          # 只有musl构建才启用CGO=0和musl-gcc，Windows/mac普通Linux直接跳过
          if [[ "${{ matrix.target.musl }}" == "true" ]]; then
            export CGO_ENABLED=0
            export CC=musl-gcc
          fi

          go build -ldflags "${{ matrix.target.ldflags }}" -o "${BIN_NAME}" cli/bilidanmaku.go

          PKG_NAME="bilidanmaku-${{ matrix.target.GOOS }}-${{ matrix.target.GOARCH }}${{ matrix.target.suffix }}"
          cp "${BIN_NAME}" tmp_pack/
          cd tmp_pack
          tar -czvf "../${PKG_NAME}.tar.gz" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilidanmaku-${{ matrix.target.GOOS }}-${{ matrix.target.GOARCH }}${{ matrix.target.suffix }}
          path: bilidanmaku-*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release_packs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release_packs/*/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
