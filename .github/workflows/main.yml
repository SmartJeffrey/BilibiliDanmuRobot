name: Build & Release Multi Platform Binary

on:
  push:
    branches: [ master, main ]
    tags: ['v*']
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          # Darwin
          - { GOOS: darwin, GOARCH: arm64, archname: arm64, gui: false, ext: tar.gz }
          - { GOOS: darwin, GOARCH: amd64, archname: x86_64, gui: false, ext: tar.gz }
          # Linux
          - { GOOS: linux, GOARCH: arm64, archname: arm64, gui: false, ext: tar.gz }
          - { GOOS: linux, GOARCH: amd64, archname: x86_64, gui: false, ext: tar.gz }
          # Windows arm64 控制台
          - { GOOS: windows, GOARCH: arm64, archname: arm64, gui: false, ext: zip }
          # Windows x86_64 控制台
          - { GOOS: windows, GOARCH: amd64, archname: x86_64, gui: false, ext: zip }
          # Windows x86_64 GUI无控制台
          - { GOOS: windows, GOARCH: amd64, archname: x86_64, gui: true, ext: zip }

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Get version tag
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER=${GITHUB_REF#refs/tags/v}
          else
            VER=dev
          fi
          echo "VER=${VER}" >> $GITHUB_ENV

      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Compile & Package binary
        run: |
          mkdir -p output tmp_pack
          # 清空C编译器环境，彻底解决交叉编译报错
          unset CC
          unset CXX
          export CGO_ENABLED=0

          BASE_NAME="BilibiliDanmuRobot"
          OS=${{ matrix.target.GOOS }}
          ARCH_NAME=${{ matrix.target.archname }}
          GUI_FLAG=${{ matrix.target.gui }}
          EXT=${{ matrix.target.ext }}
          VER=${{ env.VER }}

          # GUI前缀与编译参数
          PKG_PREFIX=""
          LDFLAGS=""
          if [[ "${GUI_FLAG}" == "true" ]]; then
            PKG_PREFIX="GUI-"
            LDFLAGS="-H windowsgui"
          fi

          # 二进制文件路径
          BIN_FILE="output/${BASE_NAME}"
          if [[ "${OS}" == "windows" ]]; then
            BIN_FILE="${BIN_FILE}.exe"
          fi

          # 交叉编译
          GOOS=${OS} GOARCH=${{ matrix.target.GOARCH }} go build -ldflags "${LDFLAGS}" -o "${BIN_FILE}" cli/bilidanmaku.go

          # 最终包文件名
          PKG_FILENAME="${PKG_PREFIX}${BASE_NAME}_${OS}_${ARCH_NAME}_${VER}.${EXT}"

          # 打包到项目根目录
          mv "${BIN_FILE}" tmp_pack/
          cd tmp_pack
          if [[ "${EXT}" == "zip" ]]; then
            zip -q ../"${PKG_FILENAME}" ./*
          else
            tar -czvf ../"${PKG_FILENAME}" ./*
          fi
          cd ..
          # 修复：使用nullglob防止无匹配文件时报错
          shopt -s nullglob
          ls -la *.tar.gz *.zip
          shopt -u nullglob
          echo "FILE=${PKG_FILENAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE }}
          path: ${{ env.FILE }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release_packs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release_packs/*/*.{tar.gz,zip}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
